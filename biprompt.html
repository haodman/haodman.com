// ── Auto-resizing textarea for module view ──
const AutoTextarea = React.forwardRef(function AutoTextarea({ value, onChange, placeholder, className, onScroll, onMouseMove, onMouseLeave }, fwdRef) {
  const innerRef = useRef(null);
  const MAX_H = 600;

  // Merge forwarded ref and inner ref
  useEffect(() => {
    if (fwdRef) {
      if (typeof fwdRef === 'function') fwdRef(innerRef.current);
      else fwdRef.current = innerRef.current;
    }
  });

  useEffect(() => {
    const ta = innerRef.current;
    if (ta) {
      ta.style.height = 'auto';
      const natural = ta.scrollHeight;
      if (natural <= MAX_H) {
        ta.style.height = natural + 'px';
        ta.style.overflowY = 'hidden';
      } else {
        ta.style.height = MAX_H + 'px';
        ta.style.overflowY = 'auto';
      }
    }
  }, [value]);

  return (
    <textarea
      ref={innerRef}
      className={className}
      value={value}
      onChange={onChange}
      onScroll={onScroll}
      onMouseMove={onMouseMove}
      onMouseLeave={onMouseLeave}
      placeholder={placeholder}
      spellCheck={false}
    />
  );
});

// ── ModuleBlock component ──
function ModuleBlock({ block, leftLang, rightLang, style, apiKey, autoXlate, onUpdate, onDelete, onDuplicate, showToast, onDragStart, onDragEnd, onDragOver, onDragLeave, onDrop, isDragOver }) {
  const [collapsed, setCollapsed] = useState(false);
  const [xlating, setXlating] = useState(null); // null | 'ltr' | 'rtl'
  const xlTimer = useRef(null);
  const blockRef = useRef(block);        // always holds latest block
  const lastEditSide = useRef(null);     // 'left' | 'right' — who typed last
  blockRef.current = block;

  const leftTok = useMemo(() => countTokens(block.left), [block.left]);
  const rightTok = useMemo(() => countTokens(block.right), [block.right]);

  // ── AI Optimize state (unified) ──
  const [aiOpen, setAiOpen] = useState(false);
  const [aiInput, setAiInput] = useState('');
  const [aiBusy, setAiBusy] = useState(false);
  const [aiSide, setAiSide] = useState('left');

  const doAiOptimize = useCallback(async () => {
    const currentText = aiSide === 'left' ? blockRef.current.left : blockRef.current.right;
    const lang = aiSide === 'left' ? leftLang : rightLang;
    if (!aiInput.trim()) return;
    setAiBusy(true);
    try {
      const result = await optimizeText(currentText, aiInput, lang, apiKey);
      const fresh = blockRef.current;
      onUpdate({ ...fresh, [aiSide]: result });
      setAiInput('');
      showToast('✓ AI 优化完成');
      // Auto-translate to the other side
      if (autoXlate) {
        const dir = aiSide === 'left' ? 'ltr' : 'rtl';
        // Small delay to let state update propagate
        setTimeout(() => doBlockTranslate(dir), 300);
      }
    } catch (e) {
      showToast('⚠ AI 优化失败: ' + e.message);
    } finally {
      setAiBusy(false);
    }
  }, [aiInput, aiSide, leftLang, rightLang, apiKey, autoXlate, onUpdate, showToast, doBlockTranslate]);

  const cycleType = () => {
    const idx = BLOCK_TYPES.findIndex(t => t.id === block.type);
    const next = BLOCK_TYPES[(idx + 1) % BLOCK_TYPES.length];
    onUpdate({ ...block, type: next.id });
  };

  // Use blockRef so the async callback always reads the freshest block
  const doBlockTranslate = useCallback(async (dir) => {
    const cur = blockRef.current;
    const src = dir === 'ltr' ? cur.left : cur.right;
    const from = dir === 'ltr' ? leftLang : rightLang;
    const to = dir === 'ltr' ? rightLang : leftLang;
    if (!src.trim()) return;
    setXlating(dir);
    try {
      const result = await translate(src, from, to, style, apiKey);
      // Re-read latest block so we never overwrite the side the user just edited
      const fresh = blockRef.current;
      onUpdate({ ...fresh, [dir === 'ltr' ? 'right' : 'left']: result });
    } catch (e) {
      showToast('⚠ 翻译失败: ' + e.message);
    } finally {
      setXlating(null);
    }
  }, [leftLang, rightLang, style, apiKey, onUpdate, showToast]);

  // Left edit → only translate left→right, cancel any pending right→left
  const handleLeftChange = useCallback((e) => {
    const text = e.target.value;
    onUpdate({ ...blockRef.current, left: text });
    lastEditSide.current = 'left';
    clearTimeout(xlTimer.current);
    if (autoXlate) {
      xlTimer.current = setTimeout(() => {
        if (text.trim() && lastEditSide.current === 'left') doBlockTranslate('ltr');
      }, 1200);
    }
  }, [onUpdate, autoXlate, doBlockTranslate]);

  // Right edit → only translate right→left, cancel any pending left→right
  const handleRightChange = useCallback((e) => {
    const text = e.target.value;
    onUpdate({ ...blockRef.current, right: text });
    lastEditSide.current = 'right';
    clearTimeout(xlTimer.current);
    if (autoXlate) {
      xlTimer.current = setTimeout(() => {
        if (text.trim() && lastEditSide.current === 'right') doBlockTranslate('rtl');
      }, 1200);
    }
  }, [onUpdate, autoXlate, doBlockTranslate]);

  useEffect(() => () => clearTimeout(xlTimer.current), []);

  const typeInfo = BLOCK_TYPES.find(t => t.id === block.type) || BLOCK_TYPES[6];
  const langL = LANGUAGES[leftLang];
  const langR = LANGUAGES[rightLang];

  const [canDrag, setCanDrag] = useState(false);

  // ── Scroll sync refs ──
  const leftTaRef = useRef(null);
  const rightTaRef = useRef(null);
  const modSyncRef = useRef(false);

  const onLeftTaScroll = useCallback(() => {
    if (modSyncRef.current || !leftTaRef.current || !rightTaRef.current) return;
    modSyncRef.current = true;
    const { scrollTop, scrollHeight, clientHeight } = leftTaRef.current;
    const ratio = scrollTop / Math.max(1, scrollHeight - clientHeight);
    rightTaRef.current.scrollTop = ratio * (rightTaRef.current.scrollHeight - rightTaRef.current.clientHeight);
    requestAnimationFrame(() => { modSyncRef.current = false; });
  }, []);

  const onRightTaScroll = useCallback(() => {
    if (modSyncRef.current || !leftTaRef.current || !rightTaRef.current) return;
    modSyncRef.current = true;
    const { scrollTop, scrollHeight, clientHeight } = rightTaRef.current;
    const ratio = scrollTop / Math.max(1, scrollHeight - clientHeight);
    leftTaRef.current.scrollTop = ratio * (leftTaRef.current.scrollHeight - leftTaRef.current.clientHeight);
    requestAnimationFrame(() => { modSyncRef.current = false; });
  }, []);

  // ── Cross-pane paragraph hover highlight ──
  const MOD_HL_CFG = useMemo(() => ({ fontSize: 13, lineH: 13 * 1.75, padTop: 12, padH: 14 }), []);
  const [hlLeft, setHlLeft] = useState(null);
  const [hlRight, setHlRight] = useState(null);

  const syncHighlight = useCallback((side, mouseY) => {
    const hovTa   = side === 'left' ? leftTaRef.current  : rightTaRef.current;
    const otherTa = side === 'left' ? rightTaRef.current : leftTaRef.current;
    const hovVal   = side === 'left' ? blockRef.current.left  : blockRef.current.right;
    const otherVal = side === 'left' ? blockRef.current.right : blockRef.current.left;

    if (!hovTa) { setHlLeft(null); setHlRight(null); return; }

    // Build paragraph lists for both sides
    const hovParas   = buildParaList(hovVal, hovTa, MOD_HL_CFG);
    const otherParas = otherTa ? buildParaList(otherVal, otherTa, MOD_HL_CFG) : [];

    // Find which paragraph index mouse is over on hovered side
    const idx = findHoveredParaIndex(hovParas, mouseY, hovTa, MOD_HL_CFG);
    if (idx < 0) {
      setHlLeft(null); setHlRight(null); return;
    }

    // Compute highlight for BOTH sides using same paragraph index
    const hovHl   = paraIndexToHighlight(hovParas, idx, hovTa, MOD_HL_CFG);
    const otherHl = otherTa ? paraIndexToHighlight(otherParas, idx, otherTa, MOD_HL_CFG) : null;

    if (side === 'left') {
      setHlLeft(hovHl);
      setHlRight(otherHl);
    } else {
      setHlRight(hovHl);
      setHlLeft(otherHl);
    }
  }, [MOD_HL_CFG]);

  const onLeftMouseMove  = useCallback((e) => syncHighlight('left', e.clientY), [syncHighlight]);
  const onRightMouseMove = useCallback((e) => syncHighlight('right', e.clientY), [syncHighlight]);

  const clearHighlights = useCallback(() => { setHlLeft(null); setHlRight(null); }, []);

  // Clear highlight on scroll
  const handleLeftScroll  = useCallback(() => { clearHighlights(); onLeftTaScroll(); }, [clearHighlights, onLeftTaScroll]);
  const handleRightScroll = useCallback(() => { clearHighlights(); onRightTaScroll(); }, [clearHighlights, onRightTaScroll]);

  return (
    <div
      className={`mod-block ${block.enabled === false ? 'disabled' : ''} ${isDragOver ? 'drag-over' : ''}`}
      draggable={canDrag}
      onDragStart={onDragStart}
      onDragEnd={(e) => { setCanDrag(false); onDragEnd(e); }}
      onDragOver={onDragOver}
      onDragLeave={onDragLeave}
      onDrop={onDrop}
    >
      {/* Header */}
      <div className="mod-header">
        <span
          className="drag-handle"
          title="拖拽排序"
          onMouseDown={() => setCanDrag(true)}
          onMouseUp={() => setCanDrag(false)}
        >⠿</span>
        <span
          className={`mod-type-badge ${block.type}`}
          onClick={cycleType}
          title="点击切换类型"
        >
          {typeInfo.emoji} {typeInfo.label}
        </span>
        <input
          className="mod-name-input"
          value={block.name}
          onChange={e => onUpdate({ ...block, name: e.target.value })}
          placeholder="模块名称..."
        />
        <button
          className={`mod-toggle ${block.enabled !== false ? 'on' : ''}`}
          onClick={() => onUpdate({ ...block, enabled: block.enabled === false ? true : false })}
          title={block.enabled !== false ? '参与输出（点击关闭）' : '已排除（点击开启）'}
        />
        <div className="mod-header-actions">
          <button className="icon-btn" onClick={() => setCollapsed(c => !c)} title={collapsed ? '展开' : '折叠'}>
            {collapsed ? <Ic.ChevRight /> : <Ic.ChevDown />}
          </button>
          <button className="icon-btn" onClick={() => onDuplicate(block)} title="复制模块">
            <Ic.Duplicate />
          </button>
          <button className="icon-btn" onClick={() => onDelete(block.id)} title="删除模块">
            <Ic.Trash />
          </button>
        </div>
      </div>

      {/* Body */}
      <div className={`mod-body ${collapsed ? 'collapsed' : ''}`}>
        {/* Left pane */}
        <div className="mod-pane">
          <div className="mod-pane-header">
            <span className="mod-pane-lang">{langL?.flag} {langL?.name}</span>
            <div className="mod-pane-gap" />
            <span className="mod-pane-tok">{leftTok} tok</span>
            {xlating === 'rtl' && <span className="spinner" style={{width:8,height:8}} />}
          </div>
          <div className="mod-textarea-wrap">
            {hlLeft && <div className="mod-para-highlight" style={{ top: hlLeft.top, height: hlLeft.height }} />}
            <AutoTextarea
              ref={leftTaRef}
              className="mod-textarea"
              value={block.left}
              onChange={handleLeftChange}
              onScroll={handleLeftScroll}
              onMouseMove={onLeftMouseMove}
              onMouseLeave={clearHighlights}
              placeholder={`输入 ${langL?.name} 内容...`}
            />
          </div>
        </div>

        {/* Right pane */}
        <div className="mod-pane">
          <div className="mod-pane-header">
            <span className="mod-pane-lang">{langR?.flag} {langR?.name}</span>
            <div className="mod-pane-gap" />
            <span className="mod-pane-tok">{rightTok} tok</span>
            {xlating === 'ltr' && <span className="spinner" style={{width:8,height:8}} />}
          </div>
          <div className="mod-textarea-wrap">
            {hlRight && <div className="mod-para-highlight" style={{ top: hlRight.top, height: hlRight.height }} />}
            <AutoTextarea
              ref={rightTaRef}
              className="mod-textarea"
              value={block.right}
              onChange={handleRightChange}
              onScroll={handleRightScroll}
              onMouseMove={onRightMouseMove}
              onMouseLeave={clearHighlights}
              placeholder={`${langR?.name} translation...`}
            />
          </div>
        </div>
      </div>

      {/* AI Optimize Bar + Footer */}
      {!collapsed && aiOpen && (
        <div className="ai-optimize-bar">
          <div className="ai-optimize-input-row">
            <Ic.Sparkle />
            <select className="ai-optimize-side" value={aiSide} onChange={e => setAiSide(e.target.value)} disabled={aiBusy}>
              <option value="left">{langL?.flag} {langL?.name}</option>
              <option value="right">{langR?.flag} {langR?.name}</option>
            </select>
            <input
              className="ai-optimize-input"
              value={aiInput}
              onChange={e => setAiInput(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey && !aiBusy) { e.preventDefault(); doAiOptimize(); } if (e.key === 'Escape') { setAiOpen(false); setAiInput(''); } }}
              placeholder="输入优化指令，如：帮我纠错 / 补充更多细节 / 加入XXX规则..."
              disabled={aiBusy}
              autoFocus
            />
            {aiBusy ? (
              <span className="spinner" style={{width:14,height:14}} />
            ) : (
              <button className="ai-optimize-send" onClick={doAiOptimize} disabled={!aiInput.trim()} title="发送">
                <Ic.Send />
              </button>
            )}
            <button className="ai-optimize-close" onClick={() => { setAiOpen(false); setAiInput(''); }} title="关闭">
              <Ic.X />
            </button>
          </div>
        </div>
      )}
      {!collapsed && (
        <div className="mod-footer">
          <span className="mod-tok-total">{leftTok + rightTok} tokens</span>
          <div className="mod-footer-gap" />
          <button className="ai-optimize-trigger" onClick={() => setAiOpen(o => !o)}>
            <Ic.Sparkle />&nbsp;AI 优化
          </button>
          <button
            className="btn btn-ghost btn-sm"
            onClick={() => doBlockTranslate('ltr')}
            disabled={!!xlating}
          >
            {xlating === 'ltr' ? <span className="spinner" style={{width:9,height:9}} /> : <Ic.Translate />}
            &nbsp;{langL?.name} → {langR?.name}
          </button>
          <button
            className="btn btn-ghost btn-sm"
            onClick={() => doBlockTranslate('rtl')}
            disabled={!!xlating}
          >
            {xlating === 'rtl' ? <span className="spinner" style={{width:9,height:9}} /> : <Ic.Translate />}
            &nbsp;{langR?.name} → {langL?.name}
          </button>
        </div>
      )}
    </div>
  );
}

// ── Compile Modal ──
function CompileModal({ blocks, leftLang, rightLang, onClose, showToast }) {
  const [tab, setTab] = useState('left');
  const langL = LANGUAGES[leftLang];
  const langR = LANGUAGES[rightLang];

  const content = useMemo(() => {
    const enabled = blocks.filter(b => b.enabled !== false);
    if (tab === 'left') {
      return enabled.map(b => b.left.trim()).filter(Boolean).join('\n\n');
    }
    if (tab === 'right') {
      return enabled.map(b => b.right.trim()).filter(Boolean).join('\n\n');
    }
    // merged
    return enabled.map(b => {
      const parts = [];
      if (b.left.trim()) parts.push(b.left.trim());
      if (b.right.trim()) parts.push(b.right.trim());
      return parts.join('\n\n');
    }).filter(Boolean).join('\n\n---\n\n');
  }, [tab, blocks]);

  const totalTok = useMemo(() => countTokens(content), [content]);

  const doCopy = () => {
    navigator.clipboard.writeText(content).then(() => showToast('✓ 已复制编译后的 Prompt'));
  };

  const doExport = (ext) => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([content], { type: 'text/plain' }));
    a.download = `biprompt-compiled.${ext}`;
    a.click();
    showToast(`✓ 已导出 .${ext}`);
  };

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal" style={{ width: 600 }}>
        <div className="modal-header">
          <div className="modal-icon">📦</div>
          <div>
            <div className="modal-title">编译 Prompt</div>
            <div className="modal-subtitle">将所有启用的模块合并为完整 Prompt · {totalTok} tokens</div>
          </div>
        </div>
        <div className="modal-body">
          <div className="compile-tabs">
            <button className={`compile-tab ${tab === 'left' ? 'active' : ''}`} onClick={() => setTab('left')}>
              {langL?.flag} {langL?.name}
            </button>
            <button className={`compile-tab ${tab === 'right' ? 'active' : ''}`} onClick={() => setTab('right')}>
              {langR?.flag} {langR?.name}
            </button>
            <button className={`compile-tab ${tab === 'merged' ? 'active' : ''}`} onClick={() => setTab('merged')}>
              🔗 双语合并
            </button>
          </div>
          <textarea className="compile-output" value={content} readOnly />
        </div>
        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={() => doExport('txt')}>
            <Ic.Download />&nbsp;TXT
          </button>
          <button className="btn btn-ghost" onClick={() => doExport('md')}>
            <Ic.Download />&nbsp;MD
          </button>
          <button className="btn btn-primary" onClick={doCopy}>
            <Ic.Copy />&nbsp;复制 Prompt
          </button>
        </div>
      </div>
    </div>
  );
}

// ── localStorage helpers ──
const STORAGE_KEY = 'biprompt_state';
const HISTORY_KEY = 'biprompt_history';

function loadSaved() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

function loadHistory() {
  try {
    const raw = localStorage.getItem(HISTORY_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}

const _defaultBlocks = () => [
  { id: newBlockId(), type: 'role',     name: '角色设定',  left: '', right: '', enabled: true },
  { id: newBlockId(), type: 'context',  name: '背景信息',  left: '', right: '', enabled: true },
  { id: newBlockId(), type: 'rules',    name: '规则约束',  left: '', right: '', enabled: true },
  { id: newBlockId(), type: 'output',   name: '输出格式',  left: '', right: '', enabled: true },
];

// ── Main App ──
function App() {
  const saved = useMemo(() => loadSaved(), []);

  // ── View mode ──
  const [viewMode, setViewMode] = useState(saved?.viewMode || 'split');

  // ── Theme ──
  const [theme, setTheme] = useState(() => {
    try { return localStorage.getItem('biprompt_theme') || 'light'; } catch(e) { return 'light'; }
  });
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    try { localStorage.setItem('biprompt_theme', theme); } catch(e) {}
  }, [theme]);
  const toggleTheme = useCallback(() => setTheme(t => t === 'light' ? 'dark' : 'light'), []);

  // ── Split view state ──
  const [leftText, setLeftText] = useState(saved?.leftText || '');
  const [rightText, setRightText] = useState(saved?.rightText || '');
  const [leftLang, setLeftLang] = useState(saved?.leftLang || 'zh');
  const [rightLang, setRightLang] = useState(saved?.rightLang || 'en');
  const [xlatingLeft, setXlatingLeft] = useState(false);
  const [xlatingRight, setXlatingRight] = useState(false);
  const [xlError, setXlError] = useState(null);

  // ── Settings ──
  const [engine, setEngine] = useState(saved?.engine || 'demo');
  const [style, setStyle] = useState(saved?.style || 'balanced');
  const [apiKey, setApiKey] = useState(saved?.apiKey || '');
  const [apiKeyDraft, setApiKeyDraft] = useState('');
  const [showSettings, setShowSettings] = useState(false);
  const [engineDraft, setEngineDraft] = useState(saved?.engine || 'demo');
  const [styleDraft, setStyleDraft] = useState(saved?.style || 'balanced');

  // ── UI state ──
  const [autoXlate, setAutoXlate] = useState(saved?.autoXlate !== undefined ? saved.autoXlate : true);
  const [sidePanel, setSidePanel] = useState('templates');
  const [toast, setToast] = useState({ msg: '', visible: false });
  const [history, setHistory] = useState(() => loadHistory());
  const [lastEdited, setLastEdited] = useState(null);

  // ── Module view state ──
  const [blocks, setBlocks] = useState(saved?.blocks || _defaultBlocks());
  const [showCompile, setShowCompile] = useState(false);
  const [dragId, setDragId] = useState(null);
  const [dragOverId, setDragOverId] = useState(null);
  const dragIdRef = useRef(null);

  const leftRef = useRef(null);
  const rightRef = useRef(null);
  const syncRef = useRef(false);
  const leftTimer = useRef(null);
  const rightTimer = useRef(null);
  const toastTimer = useRef(null);

  // ── Auto-save to localStorage (debounced) ──
  const saveTimer = useRef(null);
  useEffect(() => {
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          viewMode, leftText, rightText, leftLang, rightLang,
          engine, style, apiKey, autoXlate, blocks,
        }));
      } catch(e) {}
    }, 600);
    return () => clearTimeout(saveTimer.current);
  }, [viewMode, leftText, rightText, leftLang, rightLang, engine, style, apiKey, autoXlate, blocks]);

  // Persist history separately
  useEffect(() => {
    try { localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); } catch(e) {}
  }, [history]);

  // ── Toast ──
  const showToast = useCallback((msg) => {
    setToast({ msg, visible: true });
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(t => ({ ...t, visible: false })), 2200);
  }, []);

  // ── Scroll sync ──
  const onLeftScroll = useCallback(() => {
    if (syncRef.current || !leftRef.current || !rightRef.current) return;
    syncRef.current = true;
    const { scrollTop, scrollHeight, clientHeight } = leftRef.current;
    const ratio = scrollTop / Math.max(1, scrollHeight - clientHeight);
    rightRef.current.scrollTop = ratio * (rightRef.current.scrollHeight - rightRef.current.clientHeight);
    requestAnimationFrame(() => { syncRef.current = false; });
  }, []);

  const onRightScroll = useCallback(() => {
    if (syncRef.current || !leftRef.current || !rightRef.current) return;
    syncRef.current = true;
    const { scrollTop, scrollHeight, clientHeight } = rightRef.current;
    const ratio = scrollTop / Math.max(1, scrollHeight - clientHeight);
    leftRef.current.scrollTop = ratio * (leftRef.current.scrollHeight - leftRef.current.clientHeight);
    requestAnimationFrame(() => { syncRef.current = false; });
  }, []);

  // ── Cross-pane paragraph highlight (split view) ──
  const SPLIT_HL_CFG = useMemo(() => ({ fontSize: EDITOR_FONT_SIZE, lineH: EDITOR_LINE_H, padTop: EDITOR_PAD_TOP, padH: EDITOR_PAD_H }), []);
  const [splitHlLeft, setSplitHlLeft] = useState(null);
  const [splitHlRight, setSplitHlRight] = useState(null);

  const syncSplitHighlight = useCallback((side, mouseY) => {
    const hovTa   = side === 'left' ? leftRef.current  : rightRef.current;
    const otherTa = side === 'left' ? rightRef.current : leftRef.current;
    const hovVal   = side === 'left' ? leftText  : rightText;
    const otherVal = side === 'left' ? rightText : leftText;

    if (!hovTa) { setSplitHlLeft(null); setSplitHlRight(null); return; }

    const hovParas   = buildParaList(hovVal, hovTa, SPLIT_HL_CFG);
    const otherParas = otherTa ? buildParaList(otherVal, otherTa, SPLIT_HL_CFG) : [];

    const idx = findHoveredParaIndex(hovParas, mouseY, hovTa, SPLIT_HL_CFG);
    if (idx < 0) { setSplitHlLeft(null); setSplitHlRight(null); return; }

    const hovHl   = paraIndexToHighlight(hovParas, idx, hovTa, SPLIT_HL_CFG);
    const otherHl = otherTa ? paraIndexToHighlight(otherParas, idx, otherTa, SPLIT_HL_CFG) : null;

    if (side === 'left') {
      setSplitHlLeft(hovHl);
      setSplitHlRight(otherHl);
    } else {
      setSplitHlRight(hovHl);
      setSplitHlLeft(otherHl);
    }
  }, [SPLIT_HL_CFG, leftText, rightText]);

  const onSplitLeftMouseMove  = useCallback((e) => syncSplitHighlight('left', e.clientY), [syncSplitHighlight]);
  const onSplitRightMouseMove = useCallback((e) => syncSplitHighlight('right', e.clientY), [syncSplitHighlight]);
  const clearSplitHighlights  = useCallback(() => { setSplitHlLeft(null); setSplitHlRight(null); }, []);

  // ── Translation logic ──
  const doTranslate = useCallback(async (text, from, to, target) => {
    if (!text.trim()) {
      if (target === 'right') setRightText('');
      else setLeftText('');
      return;
    }
    setXlError(null);
    if (target === 'right') setXlatingRight(true);
    else setXlatingLeft(true);
    try {
      const result = await translate(text, from, to, style, apiKey);
      if (target === 'right') setRightText(result);
      else setLeftText(result);
    } catch (err) {
      setXlError(err.message);
      showToast('⚠ 翻译失败：' + err.message);
    } finally {
      if (target === 'right') setXlatingRight(false);
      else setXlatingLeft(false);
    }
  }, [style, apiKey, showToast]);

  const handleLeftChange = useCallback((e) => {
    const text = e.target.value;
    setLeftText(text);
    setLastEdited('left');
    if (!autoXlate) return;
    clearTimeout(leftTimer.current);
    leftTimer.current = setTimeout(() => doTranslate(text, leftLang, rightLang, 'right'), 900);
  }, [autoXlate, leftLang, rightLang, doTranslate]);

  const handleRightChange = useCallback((e) => {
    const text = e.target.value;
    setRightText(text);
    setLastEdited('right');
    if (!autoXlate) return;
    clearTimeout(rightTimer.current);
    rightTimer.current = setTimeout(() => doTranslate(text, rightLang, leftLang, 'left'), 900);
  }, [autoXlate, rightLang, leftLang, doTranslate]);

  // Re-translate when language changes
  useEffect(() => {
    if (!autoXlate || !leftText) return;
    const timer = setTimeout(() => doTranslate(leftText, leftLang, rightLang, 'right'), 400);
    return () => clearTimeout(timer);
  }, [leftLang, rightLang]);

  // ── Actions ──
  const copy = useCallback((text, label) => {
    navigator.clipboard.writeText(text).then(() => showToast(`✓ ${label}已复制`));
  }, [showToast]);

  const copyMerged = useCallback(() => {
    const l = LANGUAGES[leftLang], r = LANGUAGES[rightLang];
    const merged = `# ${l.flag} ${l.name}\n\n${leftText}\n\n---\n\n# ${r.flag} ${r.name}\n\n${rightText}`;
    navigator.clipboard.writeText(merged).then(() => showToast('✓ 双语内容已合并复制'));
  }, [leftText, rightText, leftLang, rightLang, showToast]);

  const exportFile = useCallback((fmt) => {
    const l = LANGUAGES[leftLang], r = LANGUAGES[rightLang];
    let content, name, type;
    if (fmt === 'md') {
      content = `# ${l.flag} ${l.name}\n\n${leftText}\n\n---\n\n# ${r.flag} ${r.name}\n\n${rightText}`;
      name = 'biprompt-export.md'; type = 'text/markdown';
    } else {
      content = `${l.flag} ${l.name}\n${'─'.repeat(50)}\n${leftText}\n\n\n${r.flag} ${r.name}\n${'─'.repeat(50)}\n${rightText}`;
      name = 'biprompt-export.txt'; type = 'text/plain';
    }
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([content], { type }));
    a.download = name;
    a.click();
    showToast(`✓ 已导出 ${name}`);
  }, [leftText, rightText, leftLang, rightLang, showToast]);

  const loadTemplate = useCallback((t) => {
    setLeftLang('zh'); setRightLang('en');
    setLeftText(t.zh); setRightText(t.en);
    showToast(`✓ 已加载：${t.name}`);
  }, [showToast]);

  const swapPanels = useCallback(() => {
    const tmpText = leftText, tmpLang = leftLang;
    setLeftText(rightText); setLeftLang(rightLang);
    setRightText(tmpText); setRightLang(tmpLang);
    showToast('↔ 已交换');
  }, [leftText, rightText, leftLang, rightLang, showToast]);

  const saveSnapshot = useCallback(() => {
    if (viewMode === 'split') {
      if (!leftText && !rightText) { showToast('⚠ 内容为空'); return; }
      const snap = { id: Date.now(), ts: new Date().toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' }), leftText, rightText, leftLang, rightLang, preview: (leftText || rightText).slice(0, 40), mode: 'split' };
      setHistory(h => [snap, ...h.slice(0, 19)]);
    } else {
      const hasContent = blocks.some(b => b.left.trim() || b.right.trim());
      if (!hasContent) { showToast('⚠ 内容为空'); return; }
      const snap = { id: Date.now(), ts: new Date().toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' }), blocks: JSON.parse(JSON.stringify(blocks)), leftLang, rightLang, preview: blocks.find(b => b.left.trim())?.left.slice(0, 40) || '(模块)', mode: 'modules' };
      setHistory(h => [snap, ...h.slice(0, 19)]);
    }
    showToast('✓ 快照已保存');
  }, [viewMode, leftText, rightText, leftLang, rightLang, blocks, showToast]);

  const loadSnapshot = useCallback((snap) => {
    if (snap.mode === 'modules' && snap.blocks) {
      setBlocks(snap.blocks);
      setViewMode('modules');
    } else {
      setLeftText(snap.leftText || ''); setRightText(snap.rightText || '');
      setViewMode('split');
    }
    setLeftLang(snap.leftLang); setRightLang(snap.rightLang);
    showToast('✓ 已恢复快照');
  }, [showToast]);

  // ── File export / import (JSON full backup) ──
  const exportJSON = useCallback(() => {
    const data = {
      _biprompt: 1,
      viewMode, leftText, rightText, leftLang, rightLang,
      engine, style, apiKey, autoXlate, blocks, history,
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `biprompt-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('✓ 已导出文件');
  }, [viewMode, leftText, rightText, leftLang, rightLang, engine, style, apiKey, autoXlate, blocks, history, showToast]);

  const importFile = useCallback(() => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          if (!data._biprompt) { showToast('⚠ 不是有效的 BiPrompt 文件'); return; }
          if (data.leftText !== undefined) setLeftText(data.leftText);
          if (data.rightText !== undefined) setRightText(data.rightText);
          if (data.leftLang) setLeftLang(data.leftLang);
          if (data.rightLang) setRightLang(data.rightLang);
          if (data.engine) { setEngine(data.engine); setEngineDraft(data.engine); }
          if (data.style) { setStyle(data.style); setStyleDraft(data.style); }
          if (data.apiKey) { setApiKey(data.apiKey); setApiKeyDraft(data.apiKey); }
          if (data.autoXlate !== undefined) setAutoXlate(data.autoXlate);
          if (data.blocks) setBlocks(data.blocks);
          if (data.history) setHistory(data.history);
          if (data.viewMode) setViewMode(data.viewMode);
          showToast('✓ 已导入文件');
        } catch(e) { showToast('⚠ 文件解析失败'); }
      };
      reader.readAsText(file);
    };
    input.click();
  }, [showToast]);

  const manualTranslate = useCallback(() => {
    if (lastEdited === 'right') doTranslate(rightText, rightLang, leftLang, 'left');
    else doTranslate(leftText, leftLang, rightLang, 'right');
  }, [lastEdited, leftText, rightText, leftLang, rightLang, doTranslate]);

  const openSettings = useCallback(() => {
    setApiKeyDraft(apiKey);
    setEngineDraft(engine);
    setStyleDraft(style);
    setShowSettings(true);
  }, [apiKey, engine, style]);

  const saveSettings = useCallback(() => {
    setApiKey(apiKeyDraft);
    setEngine(apiKeyDraft ? 'claude' : 'demo');
    setStyle(styleDraft);
    setShowSettings(false);
    showToast('✓ 设置已保存');
  }, [apiKeyDraft, styleDraft, showToast]);

  // ── Module actions ──
  const addBlock = useCallback((type = 'custom') => {
    const typeInfo = BLOCK_TYPES.find(t => t.id === type) || BLOCK_TYPES[6];
    const defaultNames = { role: '角色设定', context: '背景信息', rules: '规则约束', skills: '技能池', output: '输出格式', examples: '示例', custom: '自定义模块' };
    setBlocks(bs => [...bs, {
      id: newBlockId(),
      type,
      name: defaultNames[type] || '自定义模块',
      left: '',
      right: '',
      enabled: true,
    }]);
    showToast(`✓ 已添加 ${typeInfo.label} 模块`);
  }, [showToast]);

  const updateBlock = useCallback((updated) => {
    setBlocks(bs => bs.map(b => b.id === updated.id ? updated : b));
  }, []);

  const deleteBlock = useCallback((id) => {
    setBlocks(bs => bs.filter(b => b.id !== id));
    showToast('✓ 模块已删除');
  }, [showToast]);

  const duplicateBlock = useCallback((block) => {
    setBlocks(bs => {
      const idx = bs.findIndex(b => b.id === block.id);
      const dup = { ...block, id: newBlockId(), name: block.name + ' (副本)' };
      const next = [...bs];
      next.splice(idx + 1, 0, dup);
      return next;
    });
    showToast('✓ 模块已复制');
  }, [showToast]);

  // ── Drag and drop ──
  const handleDragStart = useCallback((id) => {
    dragIdRef.current = id;
    setDragId(id);
  }, []);

  const handleDragEnd = useCallback(() => {
    dragIdRef.current = null;
    setDragId(null);
    setDragOverId(null);
  }, []);

  const handleDragOver = useCallback((id, e) => {
    e.preventDefault();
    setDragOverId(id);
  }, []);

  const handleDragLeave = useCallback(() => {
    setDragOverId(null);
  }, []);

  const handleDrop = useCallback((targetId) => {
    const fromId = dragIdRef.current;
    if (!fromId || fromId === targetId) { dragIdRef.current = null; setDragId(null); setDragOverId(null); return; }
    setBlocks(bs => {
      const fromIdx = bs.findIndex(b => b.id === fromId);
      const toIdx = bs.findIndex(b => b.id === targetId);
      if (fromIdx < 0 || toIdx < 0) return bs;
      const next = [...bs];
      const [moved] = next.splice(fromIdx, 1);
      next.splice(toIdx, 0, moved);
      return next;
    });
    dragIdRef.current = null;
    setDragId(null);
    setDragOverId(null);
  }, []);

  // ── Derived ──
  const leftTokens = useMemo(() => countTokens(leftText), [leftText]);
  const rightTokens = useMemo(() => countTokens(rightText), [rightText]);
  const leftChars = useMemo(() => countChars(leftText), [leftText]);
  const rightChars = useMemo(() => countChars(rightText), [rightText]);

  const moduleTotalTok = useMemo(() => {
    return blocks.filter(b => b.enabled !== false).reduce((sum, b) => sum + countTokens(b.left) + countTokens(b.right), 0);
  }, [blocks]);

  const togglePanel = (name) => setSidePanel(p => p === name ? null : name);

  return (
    <div className="app">

      {/* ── Header ── */}
      <header className="header">
        <div className="logo">
          <div className="logo-mark">Bi</div>
          <span className="logo-name">BiPrompt</span>
          <span className="logo-tag">双语编辑器</span>
        </div>

        <div className="header-center">
          <div className="view-tabs">
            <button className={`view-tab ${viewMode === 'split' ? 'active' : ''}`} onClick={() => setViewMode('split')}>
              双栏编辑
            </button>
            <button className={`view-tab ${viewMode === 'modules' ? 'active' : ''}`} onClick={() => setViewMode('modules')}>
              模块化
            </button>
          </div>
        </div>

        <div className="header-right">
          <button className="btn btn-ghost" onClick={() => togglePanel('history')}>
            <Ic.History />&nbsp;历史
          </button>
          <button className="btn btn-ghost" onClick={() => togglePanel('templates')}>
            <Ic.Template />&nbsp;模板
          </button>
          <button className="btn btn-ghost" onClick={saveSnapshot}>
            <Ic.Save />&nbsp;快照
          </button>
          <button className="btn btn-subtle" onClick={openSettings}>
            <Ic.Settings />&nbsp;设置
          </button>
          <button className="theme-toggle" onClick={toggleTheme} title={theme === 'light' ? '切换深色模式' : '切换浅色模式'}>
            {theme === 'light' ? <Ic.Moon /> : <Ic.Sun />}
          </button>
          {apiKey
            ? <span className="api-status connected">● Claude AI 已连接</span>
            : <span className="api-status demo">● 演示模式</span>
          }
        </div>
      </header>

      {/* ── Toolbar (Split View) ── */}
      {viewMode === 'split' && (
        <div className="toolbar">
          <div className="tb-group">
            <span className="tb-label">翻译</span>
            <div className="toggle-pill">
              <button className={`toggle-opt ${autoXlate ? 'active' : ''}`} onClick={() => setAutoXlate(true)}>自动</button>
              <button className={`toggle-opt ${!autoXlate ? 'active' : ''}`} onClick={() => setAutoXlate(false)}>手动</button>
            </div>
            {!autoXlate && (
              <button className="btn btn-primary" onClick={manualTranslate}>
                翻译 →
              </button>
            )}
          </div>

          <div className="tb-sep" />

          <div className="tb-group">
            <span className="tb-label">风格</span>
            <select value={style} onChange={e => setStyle(e.target.value)}>
              <option value="formal">正式</option>
              <option value="balanced">均衡</option>
              <option value="casual">口语</option>
            </select>
          </div>

          <div className="tb-sep" />

          <div className="tb-group">
            <span className="tb-label">引擎</span>
            <select value={engine} onChange={e => setEngine(e.target.value)}>
              <option value="demo">演示模式</option>
              <option value="claude">Claude AI</option>
            </select>
          </div>

          <div className="tb-spacer" />

          <div className="tb-group">
            <button className="btn btn-ghost" onClick={() => exportFile('txt')}>
              <Ic.Download />&nbsp;TXT
            </button>
            <button className="btn btn-ghost" onClick={() => exportFile('md')}>
              <Ic.Download />&nbsp;MD
            </button>
            <button className="btn btn-outline" onClick={copyMerged}>
              <Ic.CopyMerge />&nbsp;复制双语
            </button>
          </div>
        </div>
      )}

      {/* ── Editor Area ── */}
      <div className="editor-area" style={{ display: viewMode === 'split' ? 'flex' : 'none' }}>

        {/* Left Panel */}
        <EditorPane
          textareaRef={leftRef}
          value={leftText}
          onChange={handleLeftChange}
          onScroll={onLeftScroll}
          lang={leftLang}
          onLangChange={setLeftLang}
          isTranslating={xlatingLeft}
          onCopy={() => copy(leftText, '左侧内容')}
          onClear={() => setLeftText('')}
          tokens={leftTokens}
          chars={leftChars}
          placeholder={"在此输入" + (LANGUAGES[leftLang]?.name || '') + "内容...\n\n支持 Markdown 格式 · 编辑后自动翻译到右侧\n点击右上角「模板」快速开始 →"}
          highlight={splitHlLeft}
          onMouseMove={onSplitLeftMouseMove}
          onMouseLeave={clearSplitHighlights}
        />

        {/* Swap Zone */}
        <div className="swap-zone">
          <div className="swap-line" />
          <button className="swap-btn" onClick={swapPanels} title="交换两侧内容与语言">
            <Ic.Swap />
          </button>
          <div className="swap-line" />
        </div>

        {/* Right Panel */}
        <EditorPane
          textareaRef={rightRef}
          value={rightText}
          onChange={handleRightChange}
          onScroll={onRightScroll}
          lang={rightLang}
          onLangChange={setRightLang}
          isTranslating={xlatingRight}
          onCopy={() => copy(rightText, '右侧内容')}
          onClear={() => setRightText('')}
          tokens={rightTokens}
          chars={rightChars}
          placeholder={"Translation will appear here (" + (LANGUAGES[rightLang]?.name || '') + ")...\n\nMarkdown supported · Edit here to translate back to the left\nOr load a template from the Templates panel →"}
          highlight={splitHlRight}
          onMouseMove={onSplitRightMouseMove}
          onMouseLeave={clearSplitHighlights}
        />

        {/* Templates Side Panel */}
        {sidePanel === 'templates' && (
          <div className="side-panel">
            <div className="side-panel-header">
              <span className="side-panel-title">Prompt 模板</span>
              <button className="icon-btn" onClick={() => setSidePanel(null)}><Ic.X /></button>
            </div>
            <div className="side-panel-list">
              {TEMPLATES.map(t => (
                <div key={t.id} className="template-card" onClick={() => loadTemplate(t)}>
                  <div className="template-card-name">{t.name}</div>
                  <div className="template-card-desc">{t.desc}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* History Side Panel */}
        {sidePanel === 'history' && (
          <div className="side-panel">
            <div className="side-panel-header">
              <span className="side-panel-title">快照历史</span>
              <button className="icon-btn" onClick={() => setSidePanel(null)}><Ic.X /></button>
            </div>
            <div className="side-panel-actions" style={{ display:'flex', gap:6, padding:'6px 12px', borderBottom:'1px solid var(--border-subtle)' }}>
              <button className="btn btn-ghost btn-sm" style={{flex:1}} onClick={exportJSON}>
                <Ic.Download /> 导出 JSON
              </button>
              <button className="btn btn-ghost btn-sm" style={{flex:1}} onClick={importFile}>
                <Ic.Link /> 导入 JSON
              </button>
            </div>
            <div className="side-panel-list">
              {history.length === 0 ? (
                <div className="empty-state">暂无历史快照<br/>点击顶部「快照」<br/>保存当前内容<br/><br/><span style={{fontSize:11,color:'var(--text-tertiary)'}}>内容已自动保存<br/>刷新不会丢失</span></div>
              ) : history.map(snap => (
                <div key={snap.id} className="history-card" onClick={() => loadSnapshot(snap)}>
                  <div className="history-time">
                    {snap.ts} · {snap.mode === 'modules' ? '' : ''} {LANGUAGES[snap.leftLang]?.flag}{LANGUAGES[snap.rightLang]?.flag}
                  </div>
                  <div className="history-preview">{snap.preview || '(空)'}</div>
                </div>
              ))}
            </div>
          </div>
        )}

      </div>

      {/* ══════════════════════════════════
          MODULE VIEW
         ══════════════════════════════════ */}
      {viewMode === 'modules' && (
        <div className="module-view">

          {/* Module Toolbar */}
          <div className="module-toolbar">
            <div className="tb-group">
              <span className="tb-label">语言</span>
              <select className="lang-select" value={leftLang} onChange={e => setLeftLang(e.target.value)}>
                {Object.entries(LANGUAGES).map(([code, l]) => (
                  <option key={code} value={code}>{l.flag} {l.name}</option>
                ))}
              </select>
              <span style={{ color: 'var(--text-tertiary)', fontSize: 12 }}>⇄</span>
              <select className="lang-select" value={rightLang} onChange={e => setRightLang(e.target.value)}>
                {Object.entries(LANGUAGES).map(([code, l]) => (
                  <option key={code} value={code}>{l.flag} {l.name}</option>
                ))}
              </select>
            </div>

            <div className="tb-sep" />

            <div className="tb-group">
              <span className="tb-label">翻译</span>
              <div className="toggle-pill">
                <button className={`toggle-opt ${autoXlate ? 'active' : ''}`} onClick={() => setAutoXlate(true)}>自动</button>
                <button className={`toggle-opt ${!autoXlate ? 'active' : ''}`} onClick={() => setAutoXlate(false)}>手动</button>
              </div>
            </div>

            <div className="tb-sep" />

            <div className="tb-group">
              <span className="tb-label">风格</span>
              <select value={style} onChange={e => setStyle(e.target.value)}>
                <option value="formal">正式</option>
                <option value="balanced">均衡</option>
                <option value="casual">口语</option>
              </select>
            </div>

            <div className="tb-sep" />

            <div className="tb-group">
              <span className="tb-label">添加</span>
              <select
                value=""
                onChange={e => { if (e.target.value) addBlock(e.target.value); e.target.value = ''; }}
                style={{ color: e => e === '' ? 'var(--text-tertiary)' : undefined }}
              >
                <option value="" disabled>+ 选择模块类型</option>
                {BLOCK_TYPES.map(t => (
                  <option key={t.id} value={t.id}>{t.emoji} {t.label}</option>
                ))}
              </select>
            </div>

            <div className="module-toolbar-gap" />

            <span className="token-badge" title="总 token 数">
              🔢 启用模块 {blocks.filter(b => b.enabled !== false).length}/{blocks.length} · ~{moduleTotalTok} tok
            </span>

            <button className="btn btn-primary" onClick={() => setShowCompile(true)}>
              <Ic.Compile />&nbsp;编译 Prompt
            </button>
          </div>

          {/* Module content row: scroll area + optional side panel */}
          <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
            {/* Module Blocks */}
            <div className="module-scroll">
              {blocks.length === 0 ? (
                <div className="mod-empty">
                  <div className="mod-empty-icon">🧩</div>
                  <div className="mod-empty-text">
                    还没有模块<br/>
                    从上方工具栏选择类型添加第一个模块
                  </div>
                  <button className="btn btn-primary" onClick={() => addBlock('role')}>
                    <Ic.Plus />&nbsp;添加角色模块
                  </button>
                </div>
              ) : (
                blocks.map(block => (
                  <ModuleBlock
                    key={block.id}
                    block={block}
                    leftLang={leftLang}
                    rightLang={rightLang}
                    style={style}
                    apiKey={apiKey}
                    autoXlate={autoXlate}
                    onUpdate={updateBlock}
                    onDelete={deleteBlock}
                    onDuplicate={duplicateBlock}
                    showToast={showToast}
                    isDragOver={dragOverId === block.id}
                    onDragStart={() => handleDragStart(block.id)}
                    onDragEnd={handleDragEnd}
                    onDragOver={(e) => handleDragOver(block.id, e)}
                    onDragLeave={handleDragLeave}
                    onDrop={() => handleDrop(block.id)}
                  />
                ))
              )}
            </div>

            {/* Side panels in module view */}
            {sidePanel === 'templates' && (
              <div className="side-panel">
                <div className="side-panel-header">
                  <span className="side-panel-title">Prompt 模板</span>
                  <button className="icon-btn" onClick={() => setSidePanel(null)}><Ic.X /></button>
                </div>
                <div className="side-panel-list">
                  {TEMPLATES.map(t => (
                    <div key={t.id} className="template-card" onClick={() => loadTemplate(t)}>
                      <div className="template-card-name">{t.name}</div>
                      <div className="template-card-desc">{t.desc}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}
            {sidePanel === 'history' && (
              <div className="side-panel">
                <div className="side-panel-header">
                  <span className="side-panel-title">快照历史</span>
                  <button className="icon-btn" onClick={() => setSidePanel(null)}><Ic.X /></button>
                </div>
                <div className="side-panel-actions" style={{ display:'flex', gap:6, padding:'6px 12px', borderBottom:'1px solid var(--border-subtle)' }}>
                  <button className="btn btn-ghost btn-sm" style={{flex:1}} onClick={exportJSON}>
                    <Ic.Download /> 导出 JSON
                  </button>
                  <button className="btn btn-ghost btn-sm" style={{flex:1}} onClick={importFile}>
                    <Ic.Link /> 导入 JSON
                  </button>
                </div>
                <div className="side-panel-list">
                  {history.length === 0 ? (
                    <div className="empty-state">暂无历史快照<br/>点击顶部「快照」<br/>保存当前内容<br/><br/><span style={{fontSize:11,color:'var(--text-tertiary)'}}>内容已自动保存<br/>刷新不会丢失</span></div>
                  ) : history.map(snap => (
                    <div key={snap.id} className="history-card" onClick={() => loadSnapshot(snap)}>
                      <div className="history-time">
                        {snap.ts} · {snap.mode === 'modules' ? '' : ''} {LANGUAGES[snap.leftLang]?.flag}{LANGUAGES[snap.rightLang]?.flag}
                      </div>
                      <div className="history-preview">{snap.preview || '(空)'}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* ── Status Bar ── */}
      <div className="status-bar">
        <div className="status-group">
          <div className="status-chip">
            <span className={`status-dot ${apiKey ? '' : 'warn'}`} />
            {apiKey ? 'Claude AI 已就绪' : '演示模式（未配置 API Key）'}
          </div>
          <div className="status-chip" style={{ color: 'var(--text-tertiary)' }}>
            {viewMode === 'split' ? '双栏编辑' : `模块化 · ${blocks.length} 个模块`}
          </div>
          {xlError && (
            <div className="status-chip" style={{ color: 'var(--danger)' }}>
              ⚠ {xlError}
            </div>
          )}
        </div>
        <div className="status-group">
          {viewMode === 'split' ? (
            <>
              <div className="status-chip">
                {LANGUAGES[leftLang]?.flag} {leftChars} chars · {leftTokens} tokens
              </div>
              <div className="status-chip" style={{ color: 'var(--border)' }}>|</div>
              <div className="status-chip">
                {LANGUAGES[rightLang]?.flag} {rightChars} chars · {rightTokens} tokens
              </div>
            </>
          ) : (
            <div className="status-chip">
              🔢 ~{moduleTotalTok} tokens (启用模块)
            </div>
          )}
        </div>
      </div>

      {/* ── Settings Modal ── */}
      {showSettings && (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && setShowSettings(false)}>
          <div className="modal">
            <div className="modal-header">
              <div className="modal-icon">⚙</div>
              <div>
                <div className="modal-title">翻译设置</div>
                <div className="modal-subtitle">配置 API Key 以启用真实 AI 翻译</div>
              </div>
            </div>
            <div className="modal-body">
              <div className="form-group">
                <label className="form-label">Claude API Key</label>
                <input
                  className="form-input"
                  type="password"
                  placeholder="sk-ant-api..."
                  value={apiKeyDraft}
                  onChange={e => setApiKeyDraft(e.target.value)}
                />
                <div className="form-hint">
                  API Key 仅保存在本地浏览器中，不会上传到任何服务器。<br />
                  <a href="https://console.anthropic.com/settings/keys" target="_blank">
                    获取 API Key <Ic.Link />
                  </a>
                </div>
              </div>

              <div className="form-group">
                <label className="form-label">翻译风格</label>
                <select className="form-select-full" value={styleDraft} onChange={e => setStyleDraft(e.target.value)}>
                  <option value="formal">正式 — 专业书面语，适合技术文档</option>
                  <option value="balanced">均衡 — 自然流畅，适合通用场景（推荐）</option>
                  <option value="casual">口语 — 轻松对话体，适合聊天 Prompt</option>
                </select>
              </div>

              <div className="info-box">
                💡 当前使用 <strong>claude-haiku-4-5</strong> 进行翻译，速度快、成本低，适合实时翻译场景。翻译质量与速度可根据需求调整模型。
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-ghost" onClick={() => setShowSettings(false)}>取消</button>
              <button className="btn btn-primary" onClick={saveSettings}>保存设置</button>
            </div>
          </div>
        </div>
      )}

      {/* ── Compile Modal ── */}
      {showCompile && (
        <CompileModal
          blocks={blocks}
          leftLang={leftLang}
          rightLang={rightLang}
          onClose={() => setShowCompile(false)}
          showToast={showToast}
        />
      )}

      {/* ── Toast ── */}
      <div className={`toast ${toast.visible ? 'visible' : ''}`}>{toast.msg}</div>

    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
} catch(e) {
  document.getElementById('root').innerHTML =
    '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:system-ui;color:#ef4444;flex-direction:column;gap:12px;padding:40px;text-align:center">' +
    '<div style="font-size:20px;font-weight:700">⚠ 渲染出错</div>' +
    '<pre style="font-size:12px;color:#666;background:#f5f5f5;padding:16px;border-radius:8px;max-width:600px;overflow:auto;text-align:left">' + e.message + '</pre>' +
    '<button onclick="location.reload()" style="margin-top:12px;padding:8px 24px;background:#6366f1;color:white;border:none;border-radius:8px;cursor:pointer;font-size:13px">重新加载</button></div>';
}
</script>
</body>
</html>
